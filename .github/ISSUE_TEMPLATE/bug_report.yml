name: Bug Report
description: Report a bug in the Mesh platform
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce the issue?
      placeholder: |
        1. Run `mesh init --provider ...`
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened? Include error output if available.
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Details about your setup.
      value: |
        - OS / Arch:
        - Go version:
        - Mesh version:
        - Substrate (Local, Fleet, Sandbox — e.g. Daytona, E2B, Fly, Modal, Cloudflare):
    validations:
      required: true

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Logs, screenshots, configuration, or anything else relevant.
    validations:
      required: false
