<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" aria-label="Mesh logo">
  <style>
    :root {
      --frame: #0A0A0B;
      --body: #2A2A2D;
      --accent: #C8956C;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --frame: #E8E4DD;
        --body: #A09A92;
        --accent: #C8956C;
      }
    }
  </style>
  <!-- Outer hexagon: the container / substrate boundary -->
  <path d="M50 8 L88 30 L88 70 L50 92 L12 70 L12 30 Z"
        fill="none" stroke="var(--frame)" stroke-width="6" stroke-linejoin="round"/>
  <!-- Inner body: persistent identity -->
  <circle cx="50" cy="50" r="14" fill="none" stroke="var(--body)" stroke-width="5"/>
  <!-- Movement arc: portability between substrates -->
  <path d="M32 38 A 24 24 0 0 1 68 38" fill="none" stroke="var(--accent)" stroke-width="5" stroke-linecap="round"/>
  <!-- Arrowhead on arc -->
  <path d="M68 38 L62 32 M68 38 L62 44" fill="none" stroke="var(--accent)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
