syntax = "proto3";

package meshplugin;

option go_package = "github.com/rethink-paradigms/mesh/internal/plugin;plugin";

message PluginMetaRequest {}

message PluginMetaResponse {
  string name = 1;
  string version = 2;
  string description = 3;
  string author = 4;
}

message HealthCheckRequest {}

message HealthCheckResponse {
  bool healthy = 1;
  string message = 2;
}

message GetAdapterRequest {}

message GetAdapterResponse {
  string substrate_name = 1;
  bool supports_export = 2;
  bool supports_import = 3;
  bool supports_inspect = 4;
}

service MeshPlugin {
  rpc PluginInfo(PluginMetaRequest) returns (PluginMetaResponse);
  rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
  rpc GetAdapter(GetAdapterRequest) returns (GetAdapterResponse);
}
